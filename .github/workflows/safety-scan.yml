name: Safety scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  safety-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository safety scan
        run: python areas/lab_operations/safety_scan.py
