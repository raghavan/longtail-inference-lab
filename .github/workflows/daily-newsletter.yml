name: Daily newsletter

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build daily digest
        run: python scripts/build_daily_newsletter.py --date "$(date -u +%F)"

      - name: Run safety scan
        run: python scripts/safety_scan.py

      - name: Commit newsletter update
        run: |
          if git diff --quiet -- docs/newsletter; then
            echo "No newsletter changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/newsletter
          git commit -m "Add daily newsletter for $(date -u +%F)"
          git push
